name: Protobuf Distribution

on:
  push:
    branches: [ master ]
    paths: [ 'src/main/proto/**' ]
  workflow_dispatch:

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Compute release version
        id: version
        run: |
          VERSION="$(date +%Y).$(date +%m).${GITHUB_RUN_ID}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  compile-python:
    runs-on: ubuntu-latest
    needs: prepare-version
    steps:
      - name: Checkout System Contracts
        uses: actions/checkout@v4
        with:
          path: system-contracts

      - name: Checkout Python Domain
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-python-domain
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: python-domain

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<81" wheel
          python -m pip install --upgrade protobuf==4.25.1 grpcio-tools==1.60.0 grpcio==1.60.0 build

      - name: Compile Protobuf for Python
        run: |
          cd system-contracts
          
          # Clean previous generated files
          rm -rf ../python-domain/src/eapp_python_domain/ethos
          mkdir -p ../python-domain/src/eapp_python_domain/ethos
          
          # Use the working approach with grpc_tools.protoc
          python -m grpc_tools.protoc \
            --python_out=../python-domain/src/eapp_python_domain/ethos \
            --grpc_python_out=../python-domain/src/eapp_python_domain/ethos \
            --pyi_out=../python-domain/src/eapp_python_domain/ethos \
            -I src/main/proto \
            $(find src/main/proto/community/apps/gramx/fifty/zero -name "*.proto")
          
          # Create __init__.py files
          find ../python-domain/src/eapp_python_domain/ethos -type d -exec touch {}/__init__.py \;

      - name: Build Python Package
        id: build
        run: |
          cd python-domain
          VERSION="${{ needs.prepare-version.outputs.version }}"
          sed -i "s/version='[^']*'/version='$VERSION'/" setup.py
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Build package using existing setup.py
          python -m build
          
          # Get file names
          TAR_FILE=$(ls dist/*.tar.gz | head -1)
          WHEEL_FILE=$(ls dist/*.whl | head -1)
          echo "tar-file=$(basename $TAR_FILE)" >> $GITHUB_OUTPUT
          echo "wheel-file=$(basename $WHEEL_FILE)" >> $GITHUB_OUTPUT

      - name: Publish Python Package
        env:
          GH_TOKEN: ${{ secrets.PROTOBUF_TOKEN }}
        run: |
          cd python-domain
          
          # Debug: Check authentication
          echo "Checking GitHub authentication..."
          gh auth status
          
          # Debug: Check repository access
          echo "Checking repository access..."
          gh repo view ${{ github.repository_owner }}/eapp-python-domain
          
          # Create release in python-domain repo
          echo "Creating release v${{ steps.build.outputs.version }}..."
          gh release create v${{ steps.build.outputs.version }} \
            --repo ${{ github.repository_owner }}/eapp-python-domain \
            --title "Release v${{ steps.build.outputs.version }}" \
            --notes "Python protobuf client package" \
            --draft=false \
            --prerelease=false
          
          # Upload package files
          TAR_FILE=$(ls dist/*.tar.gz | head -1)
          WHEEL_FILE=$(ls dist/*.whl | head -1)
          echo "Uploading $TAR_FILE and $WHEEL_FILE..."
          gh release upload v${{ steps.build.outputs.version }} "$TAR_FILE" "$WHEEL_FILE" \
            --repo ${{ github.repository_owner }}/eapp-python-domain \
            --clobber
          
          # Create package index from template
          mkdir -p packages
          cp ../system-contracts/templates/python-package-index.html packages/index.html
          
          # Replace placeholders
          sed -i "s/{{VERSION}}/${{ steps.build.outputs.version }}/g" packages/index.html
          sed -i "s/{{TAR_FILE}}/${{ steps.build.outputs.tar-file }}/g" packages/index.html
          sed -i "s/{{WHEEL_FILE}}/${{ steps.build.outputs.wheel-file }}/g" packages/index.html
          sed -i "s/{{TIMESTAMP}}/$(date -u)/g" packages/index.html

      - name: Commit Python Package Index
        run: |
          cd python-domain
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update protobuf generated code and package index for v${{ steps.build.outputs.version }}" || echo "No changes to commit"
          git push origin master

  compile-dart:
    runs-on: ubuntu-latest
    needs: prepare-version
    steps:
      - name: Checkout System Contracts
        uses: actions/checkout@v4
        with:
          path: system-contracts

      - name: Checkout Dart Domain
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-dart-domain
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: dart-domain

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.12.2'

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Dart protobuf compiler
        run: |
          dart pub global activate protoc_plugin
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Compile Protobuf for Dart
        run: |
          cd system-contracts
          
          # Clean previous generated files
          rm -rf ../dart-domain/src/eapp_dart_domain/ethos
          mkdir -p ../dart-domain/src/eapp_dart_domain/ethos
          
          # Generate Dart protobuf code using the working approach
          protoc \
            --dart_out=grpc:"../dart-domain/src/eapp_dart_domain/ethos" \
            google/protobuf/timestamp.proto \
            google/protobuf/any.proto \
            -I src/main/proto \
            $(find src/main/proto/community/apps/gramx/fifty/zero -name "*.proto")

      - name: Build Dart Package
        id: build
        run: |
          cd dart-domain/src/eapp_dart_domain
          VERSION="${{ needs.prepare-version.outputs.version }}"
          sed -i "s/version: .*/version: $VERSION/" pubspec.yaml
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Get dependencies
          dart pub get

      - name: Publish Dart Package
        env:
          GH_TOKEN: ${{ secrets.PROTOBUF_TOKEN }}
        run: |
          cd dart-domain/src/eapp_dart_domain
          if gh release view v${{ steps.build.outputs.version }} --repo ${{ github.repository_owner }}/eapp-dart-domain >/dev/null 2>&1; then
            echo "Release v${{ steps.build.outputs.version }} already exists."
          else
            gh release create v${{ steps.build.outputs.version }} \
              --repo ${{ github.repository_owner }}/eapp-dart-domain \
              --title "Release v${{ steps.build.outputs.version }}" \
              --notes "Dart protobuf client package" \
              --draft=false \
              --prerelease=false
          fi
          
          # Create tarball
          tar -czf ../../../eapp-dart-domain-${{ steps.build.outputs.version }}.tar.gz *
          
          # Upload package file
          gh release upload v${{ steps.build.outputs.version }} ../../../eapp-dart-domain-${{ steps.build.outputs.version }}.tar.gz \
            --repo ${{ github.repository_owner }}/eapp-dart-domain \
            --clobber
          
          # Create package index from template
          mkdir -p ../packages
          cp ../../../system-contracts/templates/dart-package-index.html ../packages/index.html
          
          # Replace placeholders
          sed -i "s/{{VERSION}}/${{ steps.build.outputs.version }}/g" ../packages/index.html
          sed -i "s/{{TAR_FILE}}/eapp-dart-domain-${{ steps.build.outputs.version }}.tar.gz/g" ../packages/index.html
          sed -i "s/{{TIMESTAMP}}/$(date -u)/g" ../packages/index.html

      - name: Commit Dart Changes
        run: |
          cd dart-domain
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update protobuf generated code for v${{ steps.build.outputs.version }}" || echo "No changes to commit"
          git push origin master

  compile-go:
    runs-on: ubuntu-latest
    needs: prepare-version
    steps:
      - name: Checkout System Contracts
        uses: actions/checkout@v4
        with:
          path: system-contracts

      - name: Checkout Go Domain
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-golang-domain
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: go-domain
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Compile Protobuf for Go
        run: |
          cd system-contracts
          rm -rf ../go-domain/community
          PATH="$PATH:$(go env GOPATH)/bin" protoc \
            --go_opt=module=github.com/50gramx/eapp-golang-domain \
            --go_out=../go-domain \
            --go-grpc_opt=module=github.com/50gramx/eapp-golang-domain \
            --go-grpc_out=../go-domain \
            -I src/main/proto \
            $(find src/main/proto/community/apps/gramx/fifty/zero -name "*.proto")

      - name: Build Go Package
        id: build
        run: |
          cd go-domain
          VERSION="${{ needs.prepare-version.outputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          go mod tidy
          go test ./...
          tar --exclude=.git -czf ../eapp-golang-domain-${VERSION}.tar.gz .
          echo "archive=../eapp-golang-domain-${VERSION}.tar.gz" >> $GITHUB_OUTPUT

      - name: Publish Go Package
        env:
          GH_TOKEN: ${{ secrets.PROTOBUF_TOKEN }}
        run: |
          cd go-domain
          gh release create v${{ steps.build.outputs.version }} \
            --repo ${{ github.repository_owner }}/eapp-golang-domain \
            --title "Release v${{ steps.build.outputs.version }}" \
            --notes "Go protobuf client package" \
            --draft=false \
            --prerelease=false
          gh release upload v${{ steps.build.outputs.version }} ${{ steps.build.outputs.archive }} \
            --repo ${{ github.repository_owner }}/eapp-golang-domain \
            --clobber

      - name: Commit Go Changes
        run: |
          cd go-domain
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update protobuf generated code for v${{ steps.build.outputs.version }}" || echo "No changes to commit"
          git push origin main
  create-central-index:
    needs: [compile-python, compile-dart, compile-go]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout System Contracts
        uses: actions/checkout@v4

      - name: Generate Consumer Registry Manifest
        run: |
          node tool/generate-consumer-registry-manifest.mjs

      - name: Create Central Package Index
        run: |
          # Create central package index from template
          mkdir -p packages
          cp templates/central-package-index.html packages/index.html
          
          # Replace timestamp placeholder
          sed -i "s/{{TIMESTAMP}}/$(date -u)/g" packages/index.html
      - name: Completion
        run: |
          echo "Protobuf distribution completed!"
          echo "Python: https://github.com/50gramx/eapp-python-domain/releases"
          echo "Dart: https://github.com/50gramx/eapp-dart-domain/releases"
          echo "Go: https://github.com/50gramx/eapp-golang-domain/releases"

  update-dart-consumer:
    needs: [create-central-index, compile-dart]
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.12.2'

      - name: Checkout System Contracts
        uses: actions/checkout@v4
        with:
          path: system-contracts

      - name: Generate Consumer Registry Manifest
        run: |
          cd system-contracts
          node tool/generate-consumer-registry-manifest.mjs

      - name: Checkout Dart Consumer
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-dart-consumer
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: dart-consumer

      - name: Checkout Dart Domain
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-dart-domain
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: dart-domain

      - name: Resolve Latest Dart Domain Version
        run: |
          cd dart-domain
          LATEST_TAG=$(git tag --sort=-creatordate | head -1)
          echo "LATEST_DART_DOMAIN_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Update Dart Consumer Dependency
        run: |
          cd dart-consumer
          sed -i "s|url: https://github.com/50gramx/eapp-dart-domain.git|url: https://github.com/50gramx/eapp-dart-domain.git|g" pubspec.yaml
          sed -i "s|ref: .*|ref: ${LATEST_DART_DOMAIN_TAG#v}|g" pubspec.yaml
          dart pub get

      - name: Generate Dart Consumer Registry
        run: |
          cd dart-consumer
          if [ -f tool/generate_consumer_registry.dart ]; then
            dart run tool/generate_consumer_registry.dart \
              --manifest ../system-contracts/consumer-registry-manifest.json
          else
            echo "Registry generator not yet present in dart-consumer repo."
            exit 1
          fi

      - name: Commit Dart Consumer Changes
        run: |
          cd dart-consumer
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md pubspec.yaml lib/eapp_dart_consumer.dart lib/src/peer_mesh/peer_mesh_client.dart lib/src/generated/mesh_registry.g.dart tool/generate_consumer_registry.dart
          git commit -m "Update dart consumer registry for ${LATEST_DART_DOMAIN_TAG}" || echo "No changes to commit"
          git push origin main




  update-dart-implementation:
    needs: [create-central-index, compile-dart]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout System Contracts
        uses: actions/checkout@v4
        with:
          path: system-contracts

      - name: Checkout Dart Implementation
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-dart-implementation
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: dart-implementation

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.12.2'

      - name: Generate Dart Implementation Scaffold
        run: |
          cd system-contracts
          node tool/generate-implementation-scaffold.mjs consumer-registry-manifest.json ../dart-implementation dart

      - name: Commit Dart Implementation Changes
        run: |
          cd dart-implementation
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md pubspec.yaml lib/eapp_dart_implementation.dart lib/src/server/placeholder_server.dart lib/src/generated
          git commit -m "Update Dart implementation scaffold from contracts" || echo "No changes to commit"
          git push origin main

  update-golang-implementation:
    needs: [create-central-index, compile-go]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout System Contracts
        uses: actions/checkout@v4
        with:
          path: system-contracts

      - name: Checkout Go Implementation
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-golang-implementation
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: go-implementation

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Generate Go Implementation Scaffold
        run: |
          cd system-contracts
          node tool/generate-implementation-scaffold.mjs consumer-registry-manifest.json ../go-implementation go

      - name: Commit Go Implementation Changes
        run: |
          cd go-implementation
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md go.mod server/generated
          git commit -m "Update Go implementation scaffold from contracts" || echo "No changes to commit"
          git push origin main


  update-go-consumer:
    needs: [create-central-index, compile-go]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout System Contracts
        uses: actions/checkout@v4
        with:
          path: system-contracts

      - name: Checkout Go Consumer
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-golang-consumer
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: go-consumer
          ref: master

      - name: Checkout Go Domain
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-golang-domain
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: go-domain
          ref: main

      - name: Build Go Consumer
        run: |
          cd go-consumer
          go test ./...

      - name: Commit Go Consumer Changes
        run: |
          cd go-consumer
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md developer_config.yaml go.mod peerclient
          git commit -m "Sync go consumer with latest protobuf domain" || echo "No changes to commit"
          git push origin master

  update-python-consumer:
    needs: [create-central-index, compile-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout System Contracts
        uses: actions/checkout@v4
        with:
          path: system-contracts

      - name: Checkout Python Consumer
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-python-consumer
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: python-consumer
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Validate Python Consumer
        run: |
          cd python-consumer
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-deps -e .
          python -m compileall src

      - name: Commit Python Consumer Changes
        run: |
          cd python-consumer
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md setup.py pyproject.toml src
          git commit -m "Sync python consumer with protobuf domain" || echo "No changes to commit"
          git push origin main

  update-python-implementation:
    needs: [create-central-index, compile-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout System Contracts
        uses: actions/checkout@v4
        with:
          path: system-contracts

      - name: Checkout Python Implementation
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/eapp-python-implementation
          token: ${{ secrets.PROTOBUF_TOKEN }}
          path: python-implementation
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Validate Python Implementation
        run: |
          cd python-implementation
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt || true

      - name: Commit Python Implementation Changes
        run: |
          cd python-implementation
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md src tests capabilities.yaml cloudbuild.yaml bitbucket-pipelines.yml Jenkinsfile Dockerfile docker-compose.yml
          git commit -m "Sync python implementation with protobuf domain" || echo "No changes to commit"
          git push origin master




